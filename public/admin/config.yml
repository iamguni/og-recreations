backend:
  name: github
  repo: iamguni/og-recreations
  branch: master
  base_url: https://sveltia-cms-auth.gurmeetworks.workers.dev
  site_url: https://ogrecreations.com

media_folder: "public/images/uploads"
public_folder: "/og-recreations/images/uploads"
local_backend: true

collections:
  - name: "global_settings"
    label: "Global Settings"
    icon: "settings"
    delete: false
    editor:
      preview: false
    files:
      - name: "communication_desk"
        label: "Contact Information"
        icon: "call"
        file: "src/data/communication.json"
        fields:
          - { label: "Direct Call Number", name: "callNumber", widget: "string" }
          - { label: "WhatsApp Contact Number", name: "whatsappNumber", widget: "string" }
          - { label: "WhatsApp Default Text Lead Message", name: "whatsappText", widget: "text" }
          
      - name: "social_media"
        label: "Social Media Matrix"
        icon: "share"
        file: "src/data/socials.json"
        format: "json"
        fields:
          - label: "Active Social Platforms Matrix"
            name: "channels"
            widget: "list"
            summary: "{{fields.platform}} - {{fields.url}}"
            fields:
              - label: "Target Platform Icon Identity"
                name: "platform"
                widget: "select"
                options: ["facebook", "instagram", "twitter", "linkedin", "youtube", "blog"]
              - { label: "Complete Profile Redirection URL", name: "url", widget: "string" }

      # 🛠️ SAFELY ADDED HERE INSIDE FILES MATRIX
      - name: "footer_architecture"
        label: "Footer Configuration"
        icon: "page_footer"
        file: "src/data/footer.json"
        fields:
          - { label: "Copyright Sub-text Notice", name: "copyrightNotice", widget: "string" }
          - label: "Dynamic Column Ordering Sequence"
            name: "columnSequence"
            widget: "list"
            summary: "{{fields.columnTitle}}"
            fields:
              - { label: "Column Title Header", name: "columnTitle", widget: "string" }
              - { label: "Column Presentation Text (For Vision Block)", name: "columnText", widget: "text", required: false }
              - { label: "Extra Column Header", name: "extraColumnTitle", widget: "string" , required: false}
              - { label: "Extra Text (e.g., Mon - Sun: 9:00 AM - 9:00 PM)", name: "extraText", widget: "string", required: false }
              - label: "Column Links Array List"
                name: "columnLinks"
                widget: "list"
                required: false
                fields:
                  - { label: "Link Display Label", name: "linkLabel", widget: "string" }
                  - { label: "Link Target Route URL", name: "linkUrl", widget: "string" }

        # 👇 THIS SPECIFIC BLOCK ADDS THE OPTIONS TO YOUR CMS PANEL
      - name: "site_branding"
        label: "Header Configuration"
        icon: "page_header"
        file: "src/data/branding.json"
        fields:
          - { label: "Site Logo Graphic Asset (Hides text if uploaded)", name: "logo", widget: "image", required: false }
          - { label: "Favicon File (.ico or .png format)", name: "favicon", widget: "image", required: false }
          - { label: "Fallback Site Title", name: "title", widget: "string" }
          - { label: "Fallback Site Tagline", name: "tagline", widget: "string" }

# 2. ENTRY FOLDER COLLECTION: Hero Sliders
  - name: "hero_sliders"
    label: "Sliders Configuration"
    icon: "transition_slide"
    folder: "src/content/sliders"
    create: true
    slug: "{{title}}"
    format: "json"
    fields:
      - { label: "Slide Identifier Title", name: "title", widget: "string" }
      - { label: "Slider Tagline / Banner Text", name: "tagline", widget: "string" }
      - { label: "Hero Main Typography Headline", name: "headline", widget: "string" }
      - { label: "Slide Main Graphic Image", name: "image", widget: "image" }
      - { label: "Call To Action Target Button Text", name: "ctaText", widget: "string" }
      - { label: "Call To Action Button Destination URL", name: "ctaUrl", widget: "string" }

  # 3. ENTRY FOLDER COLLECTION: Chronicles Horizontal Timeline
  - name: "chronicles"
    label: "Chronicles of Our Past"
    icon: "history_edu"
    folder: "src/content/chronicles"
    create: true
    slug: "{{year}}-{{month}}-{{title}}"
    format: "json"
    fields:
      - { label: "Event Short Identifier Title", name: "title", widget: "string" }
      - { label: "Event Target Year", name: "year", widget: "string" }
      - { label: "Event Target Month", name: "month", widget: "string" }
      - { label: "Milestone Visual Banner Image", name: "image", widget: "image" }
      - { label: "Comprehensive Historical Description Summary", name: "description", widget: "text" }

  # 4. ENTRY FOLDER COLLECTION: Institutional Partners
  - name: "institutional_partners"
    label: "Partners Grid"
    icon: "groups"
    folder: "src/content/partners"
    create: true
    slug: "{{title}}"
    format: "json"
    fields:
      - { label: "Partner Corporate Name", name: "title", widget: "string" }
      - { label: "Partner Corporate Logo Asset", name: "logo", widget: "image", required: false }
      - { label: "Target Redirection Website URL", name: "url", widget: "string" }

# 5. ENTRY FOLDER COLLECTION: Synchronized 3-Pillar Services
  - name: "synchronized_services"
    label: "Services Configuration"
    icon: "design_services"
    folder: "src/content/services"
    create: true
    slug: "{{slugId}}"
    format: "json"
    fields:
      - { label: "Service Pillar Title", name: "title", widget: "string" }
      - { label: "Unique Service URL Route Identifier", name: "slugId", widget: "string" }
      - { label: "Service Main Visual Card Image", name: "image", widget: "image" }
      - { label: "Brief Presentation Intro Summary", name: "description", widget: "text" }
      - label: "Modern Layout Sub-Services Matrix"
        name: "subServices"
        widget: "list"
        summary: "{{fields.subServiceTitle}}"
        fields:
          - { label: "Sub-Service Title Name", name: "subServiceTitle", widget: "string" }
          - { label: "Sub-Service Tagline", name: "subServiceTagline", widget: "string", required: false }
          - { label: "Sub-Service Focus Summary Brief", name: "subServiceBrief", widget: "text" }
          - { label: "Energy / Vibe Parameter Label", name: "energyVibe", widget: "string", required: false }
          - { label: "Target Audience Demographics", name: "targetAudience", widget: "string", required: false }
          - { label: "Sub-Service Graphic Image Asset", name: "subServiceImage", widget: "image", required: false }
          - label: "Core Execution Metrics (Tags)"
            name: "deliveryMetrics"
            widget: "list"
            field: { label: "Metric Tag", name: "tag", widget: "string" }
          - label: "Popular Program Focus Badges"
            name: "focusBadges"
            widget: "list"
            required: false
            field: { label: "Badge Tag", name: "badge", widget: "string" }

  # 6. FILE-BASED SETTINGS COLLECTION: About Us Configuration Page
  - name: "about_us_page"
    label: "About Us Content"
    icon: "info"
    delete: false
    files:
      - name: "about_content"
        label: "About Us Narrative Blocks"
        icon: "page_info"
        file: "src/data/about.json"
        fields:
          - { label: "Dynamic Video Display Mode", name: "videoMode", widget: "select", options: ["URL", "Upload"] }
          - { label: "Video Destination URL", name: "videoUrl", widget: "string", required: false }
          - { label: "Direct Video Asset Upload Node", name: "videoFile", widget: "file", required: false }
          - { label: "Vision Headline", name: "visionTitle", widget: "string" }
          - { label: "Vision Graphic Banner Image", name: "visionImage", widget: "image" }
          - { label: "Vision Descriptive Body Paragraph", name: "visionText", widget: "text" }
          - { label: "Mission Headline", name: "missionTitle", widget: "string" }
          - { label: "Mission Graphic Banner Image", name: "missionImage", widget: "image" }
          - { label: "Mission Descriptive Body Paragraph", name: "missionText", widget: "text" }

  # 7. ENTRY FOLDER COLLECTION: Event Photo Gallery Room
  - name: "photo_gallery"
    label: "Photo Gallery Room"
    icon: "photo_library"
    folder: "src/content/gallery"
    create: true
    slug: "{{title}}"
    format: "json"
    fields:
      - { label: "Snapshot Performance Event Title", name: "title", widget: "string" }
      - { label: "High-Res Event Image File", name: "image", widget: "image" }

# 🛠️ Restructured Root Collection: Turns every poet row into an independent file
  - name: "independent_poets_hub"
    label: "Renowned Poets Registry"
    icon: "history_edu"
    folder: "src/content/poets" # 👈 Saves each entry dynamically into this folder
    create: true
    format: "json"
    slug: "{{title}}"
    
    # 🔍 Sveltia Global Filter Panel UI Setup
    view_filters:
      - label: "Has Pen Name"
        field: "penName"
        pattern: ".+"
    view_groups:
      - label: "Group by Genre Specialty"
        field: "specialty"
        
    fields:
      - { label: "Poet Full Name", name: "title", widget: "string" }
      - { label: "Poetic Pseudonym / Takhallis", name: "penName", widget: "string", required: false }
      - { label: "Poetic Genre Specialty", name: "specialty", widget: "string" }
      - { label: "Poet Profile Portrait Image", name: "image", widget: "image", required: false }
      - { label: "Biographical Summary", name: "bio", widget: "text" }
